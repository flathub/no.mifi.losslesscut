name: ffmpeg
# https://github.com/mifi/ffmpeg-build-script/blob/95d65fbf94b6574b441e499646b4d7f855365372/build-ffmpeg#L459
config-opts:
  - --enable-shared
  - --disable-static
  - --disable-doc
  - --disable-manpages
  - --disable-stripping
  - --disable-ffplay
  - --enable-ffprobe
  - --disable-lzma
  - --enable-runtime-cpudetect
  - --disable-xlib
  - --disable-libxcb-shm
  - --disable-libxcb-xfixes
  - --disable-libxcb-shape
  - --disable-outdevs
  - --disable-indevs
  - --enable-indev=lavfi

  - --disable-securetransport
  - --enable-runtime-cpudetect

  - --enable-gpl
  - --enable-version3
  - --enable-optimizations
  - --enable-pthreads
  #- --enable-gnutls
  - --enable-libxcb-xfixes
  - --enable-opengl
  #- --enable-sdl2
  - --enable-vaapi
  - --enable-vdpau
  #- --enable-zlib
  #- --enable-bzlib
  #- --enable-lzma

  - --enable-fontconfig
  - --enable-libfontconfig
  - --enable-libfreetype

  # copied from another manifest
  - --enable-avcodec
  - --enable-avfilter
  - --enable-filters
  - --enable-avdevice
  #- --enable-libxml2
  - --enable-swscale

  - --enable-libxcb

  - --enable-protocol=file

#post-install:
    # This is what losslesscut tried to execute:
    #- /app/bin/ffmpeg -hide_banner -f lavfi -i nullsrc=s=256x256:d=1 -f null -

sources:
  - type: archive
    url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz
    sha512: 9deb30b93c27873564ec094693e72ff552f63a09af3175f9118672b88299a4e9495502aa0fb2dfbcd45857ba255f24b829bdd3c3c17d0f1eee75423302a9af8c
    x-checker-data:
      type: anitya
      project-id: 5405
      url-template: https://ffmpeg.org/releases/ffmpeg-$version.tar.xz
cleanup:
  - /share/ffmpeg/examples

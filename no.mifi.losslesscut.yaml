app-id: no.mifi.losslesscut
runtime: org.freedesktop.Platform
runtime-version: '25.08'
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
separate-locales: false

command: run.sh
finish-args:
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri         # Without DRI the app doesn't come up :-/
  - --socket=pulseaudio  # We want to play sound, I suppose
  - --socket=wayland
  # Electron cannot do portals :(
  - --filesystem=xdg-download
  - --filesystem=xdg-public-share
  - --filesystem=xdg-videos
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: lossless-cut
    buildsystem: simple
    run-tests: true
    build-options:
      append-path: /usr/lib/sdk/node24/bin
      append-pkg-config-path: /app/lib64/pkgconfig
      append-ld-library-path: /app/lib64/
      env:
        NPM_CONFIG_LOGLEVEL: info
        npm_config_nodedir: /usr/lib/sdk/node24
        XDG_CACHE_HOME: /run/build/lossless-cut/flatpak-node/cache
        # more verbose
        YARN_ENABLE_INLINE_BUILDS: '1'
        # disable telemetry
        YARN_ENABLE_TELEMETRY: '0'
        # disable network access
        YARN_ENABLE_NETWORK: '0'
        # disable global cache
        YARN_ENABLE_GLOBAL_CACHE: '0'
        # set yarn global folder
        YARN_GLOBAL_FOLDER: /run/build/lossless-cut/flatpak-node/yarn-berry
        # npm libvips wants to download libvips
        SHARP_FORCE_GLOBAL_LIBVIPS: '1'

    modules:
      - ffmpeg.yaml
      - name: libvips
        buildsystem: meson
        sources:
          - type: archive
            url: https://github.com/libvips/libvips/releases/download/v8.18.0/vips-8.18.0.tar.xz
            sha512: 5f1a9202a018a000c7552d2107989041ba98a624bf931d1199e18bbe47e97b096448e7cdfc8d512c36406ba350e098029b382b0b7ce829c7ffef2228127a3354
            x-checker-data:
              type: json
              url: https://api.github.com/repos/libvips/libvips/releases/latest
              version-query: .tag_name | sub("^v"; "")
              url-query: .assets[] | select(.name=="vips-" + $version + ".tar.xz")
                | .browser_download_url

    build-commands:
      - echo $PKG_CONFIG_PATH
      - pkg-config --modversion vips-cpp
      - echo $LD_LIBRARY_PATH
      - node --version
      - yarn --version
      - yarn config
      - yarn plugin import $FLATPAK_BUILDER_BUILDDIR/flatpak-node/flatpak-yarn.js
      - yarn convertToZip $(which yarn)

      - yarn install
      - yarn build
      - |
        . flatpak-node/electron-builder-arch-args.sh
        yarn run pack-linux $ELECTRON_BUILDER_ARCH_ARGS --config.asar=false --dir
      - mkdir -p /app/lossless-cut
      - cp -ar dist/linux-*unpacked/* /app/lossless-cut/
      - install -Dm a+rx /app/bin/ffmpeg  /app/lossless-cut/resources/ffmpeg
      - install -Dm a+rx /app/bin/ffprobe  /app/lossless-cut/resources/ffprobe

      # Install the required static files
      - install run.sh /app/bin/run.sh
      - desktop-file-edit --set-key Exec --set-value /app/bin/run.sh  no.mifi.losslesscut.desktop
      - install -Dm 0644 no.mifi.losslesscut.desktop  /app/share/applications/no.mifi.losslesscut.desktop
      - install -Dm 0644 no.mifi.losslesscut.appdata.xml  /app/share/metainfo/no.mifi.losslesscut.appdata.xml
      - install -Dm 0644 src/renderer/src/icon.svg /app/share/icons/hicolor/scalable/apps/no.mifi.losslesscut.svg

    test-commands:
      - /app/lossless-cut/resources/ffprobe -version
      - /app/lossless-cut/resources/ffmpeg -version
      # This is what the app would call. Let's try it ourselves to see whether we're good.
      - /app/lossless-cut/resources/ffmpeg '-hide_banner' '-f' 'lavfi' '-i' 'nullsrc=s=256x256:d=1'
        '-f' 'null' '-'

    sources:
      - type: archive
        url: https://github.com/mifi/lossless-cut/archive/v3.68.1.tar.gz
        sha512: ae2be308096b1c4d8a8e118cd21780bd582e47b55817f6b2033e339fdeb42b4a08df702eed72cfc34743edf7dec6fc92247c57c1bddb6f5e2925e57e8db045fc
        x-checker-data:
          type: json
          url: https://api.github.com/repos/mifi/lossless-cut/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name=="" + $version + ".tar.xz") | .browser_download_url

      - type: script
        dest-filename: run.sh
        commands:
          - /app/lossless-cut/losslesscut --no-sandbox

      - generated-sources.json
